<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Weather App</title>
</head>

<body>

    <div class="main-container">

        <!-- SCREEN 1 -->
        <div class="search-container">

            <input type="text" id="city-input" placeholder="Enter city name">

            <button id="search-button">
                Search
            </button>

        </div>



        <!-- SCREEN 2 -->
        <div class="weather-container">

            <!-- TOP SECTION -->
            <div class="top-section">

                <button type="button" id="back-button"> Back </button>

                <h2 id="city-name">city name</h2>

                <div class="information">

                    <img id="Temperature-icon" src="images/weather.png.png" alt="Weather Icon">

                    <h2 id="main-temp">0°C</h2>

                </div>

            </div>



            <!-- BOTTOM SECTION -->
            <div class="bottom-section">

                    <div class="weather-card">

                    <img id="feels-like-icon" src="images/feels-like.png.png" alt="Feels Like Icon">

                    <p>Feels like</p>

                    <p id="feels-like-value">0°C</p>

                </div>

                <div class="weather-card">

                    <img id="pressure-icon" src="images/pressure.png.png" alt="Pressure Icon">

                    <p>Pressure</p>

                    <p id="pressure-value">0 hPa</p>

                </div>



                <div class="weather-card">

                    <img id="humidity-icon" src="images/humidity.png.png" alt="Humidity Icon">

                    <p>Humidity</p>

                    <p id="humidity-value">0%</p>

                </div>



                <div class="weather-card">

                    <img id="wind-icon" src="images/wind.png.png" alt="Wind Speed Icon">

                    <p>Wind Speed</p>

                    <p id="wind-value">0 km/h</p>

                </div>


            </div>

        </div>

    </div>
<script src = "config.js"></script>
<script src="app.js"></script>
</body>
</html>
